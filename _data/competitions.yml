- title: 2025 中国研究生创“芯”大赛·EDA精英挑战赛
  abbr: EDA Elite Challenge
  result: 全国一等奖
  role: 唯一作者
  authors:
    - 罗灿辉
    - 吕志鹏
    - 苏宙行
  preview: EDAChallenge25.jpg
  context: 命题企业 | 思尔芯（支持重新组网的多 FPGA 系统布线）
  date: 2025.07 - 2025.11
  selected: true
  summary: 提出两阶段启发式优化算法，结合负载均衡组网、候选路径预生成、随机顺序迭代与弹动池优化实现全局布线搜索；在公开测试集上高效降低整体通信时延，多个复杂案例取得最优性能，获全国一等奖及思尔芯企业特别奖。

- title: PACE 2025 最小支配集与碰撞集优化竞赛
  abbr: PACE
  result: 全球第一名
  role: 唯一作者
  authors:
    - 罗灿辉
    - 张庆雲
    - 苏宙行
    - 吕志鹏
  preview: PACEChallenge25.jpg
  context: 工业场景 | 设施选址、资源分配、故障检测
  date: 2025.02 - 2025.06
  selected: true
  summary: 提出基于元素加权的禁忌搜索算法，自适应赋予难被覆盖元素更高的权重引导搜索的集合选择；在超大规模测试实例集上实现高效求解并显著减少资源消耗，获碰撞集启发式优化赛道全球第一名。

